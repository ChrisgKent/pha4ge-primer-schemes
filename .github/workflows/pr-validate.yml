name: PR Validate Schemes

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install primaschema (pinned)
        run: |
          uv pip install "primaschema @ git+https://github.com/ChrisgKent/pha4ge-primaschema@1c895f5"

      - name: Validate schemes
        run: |
          uv run primaschema validate --all --strict --path ./schemes

      - name: Build index (check only)
        run: |
          uv run primaschema build-manifest --root ./schemes --out ./_index_check

      - name: Upload index artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: index.json
          path: ./_index_check/index.json
